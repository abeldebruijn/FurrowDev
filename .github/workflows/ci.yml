name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: ${{ matrix.task-name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - task-name: Check
            command: vp check
          - task-name: Test
            command: vp test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: lts
          cache: true
          run-install: true

      - name: Run ${{ matrix.task-name }}
        run: ${{ matrix.command }}
