# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "FurrowDev"

[setup]
script = '''
#!/bin/bash
MAIN_CHECKOUT=$CODEX_SOURCE_TREE_PATH

# Copy environment and config files
for file in .env .env.local .envrc .tool-versions; do
  if [ -f "$MAIN_CHECKOUT/$file" ]; then
    cp "$MAIN_CHECKOUT/$file" "./$file"
    echo "Copied $file"
  fi
done

vp install
'''

[[actions]]
name = "dev"
icon = "tool"
command = '''
PORT=3000

PIDS=$(lsof -ti :"$PORT")

if [[ -z "$PIDS" ]]; then
  echo "Port $PORT is free."
  vp run dev
fi

echo "Port $PORT is currently in use by:"
lsof -i :"$PORT"
echo
read -r -p "Do you want to kill the process(es) using port $PORT? [y/N] " RESPONSE

if [[ "$RESPONSE" =~ ^[Yy]$ ]]; then
  kill $PIDS
  echo "Sent SIGTERM to process(es): $PIDS"
  vp run dev
else
  echo "No processes were killed. Please stop them manually if needed."
fi
'''

[[actions]]
name = "test"
icon = "tool"
command = "vp test"

[[actions]]
name = "migrate"
icon = "tool"
command = "vp run db:migrate"
